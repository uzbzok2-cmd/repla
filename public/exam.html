<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Imtihon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:var(--tg-theme-bg-color,#ffffff);
  --bg2:var(--tg-theme-secondary-bg-color,#f0f2f5);
  --text:var(--tg-theme-text-color,#1a1a1a);
  --hint:var(--tg-theme-hint-color,#8a8a8a);
  --accent:var(--tg-theme-button-color,#2AABEE);
  --accent-t:var(--tg-theme-button-text-color,#ffffff);
  --link:var(--tg-theme-link-color,#2AABEE);
  --danger:#e74c3c;
  --warn:#f39c12;
  --success:#27ae60;
  --border:rgba(0,0,0,0.08);
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg)}
.spinner{width:48px;height:48px;border:4px solid var(--bg2);border-top:4px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--hint);font-size:14px}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px}
#section-steps{display:flex;gap:6px;padding:12px 0 8px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
#section-steps::-webkit-scrollbar{display:none}
.step-dot{flex-shrink:0;width:32px;height:6px;border-radius:3px;background:var(--bg2);transition:all 0.3s}
.step-dot.active{background:var(--accent);width:48px}
.step-dot.done{background:var(--success)}
#header-main{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
#section-label{display:flex;align-items:center;gap:8px}
#section-emoji{font-size:22px}
#section-name{font-weight:700;font-size:15px;color:var(--text)}
#section-sub{font-size:11px;color:var(--hint)}
#timer-box{display:flex;align-items:center;gap:4px;background:var(--bg2);border-radius:20px;padding:6px 12px}
#timer-icon{font-size:14px}
#timer-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;min-width:40px;text-align:right}

/* PROGRESS BAR */
#progress-wrap{height:3px;background:var(--bg2)}
#progress-bar{height:3px;background:var(--accent);transition:width 0.4s;width:0%}

/* MAIN CONTENT */
#main{padding-top:calc(var(--header-h, 100px) + 4px);padding-bottom:80px;min-height:100vh}
.passage-card{background:var(--bg2);border-radius:16px;margin:12px 16px;padding:16px;line-height:1.65;font-size:14px;color:var(--text);border:1px solid var(--border)}
.passage-title{font-weight:700;font-size:15px;margin-bottom:10px;color:var(--accent)}
.passage-text{white-space:pre-wrap;word-break:break-word}
.questions-block{padding:8px 16px}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.q-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.q-num{display:inline-block;background:var(--accent);color:var(--accent-t);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.q-text{font-size:14px;line-height:1.55;color:var(--text)}
.options-list{padding:8px 0}
.option{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s;user-select:none;border-bottom:1px solid var(--border)}
.option:last-child{border-bottom:none}
.option:active{background:var(--bg2)}
.opt-badge{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--bg2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--hint);transition:all 0.2s}
.opt-text{flex:1;font-size:14px;line-height:1.4;color:var(--text)}
.opt-check{flex-shrink:0;font-size:18px;opacity:0;transition:opacity 0.2s}
.option.selected{background:rgba(var(--accent-rgb,42,171,238),0.08)}
.option.selected .opt-badge{background:var(--accent);border-color:var(--accent);color:var(--accent-t)}
.option.selected .opt-text{color:var(--accent);font-weight:600}
.option.selected .opt-check{opacity:1}

/* FILL BLANK question */
.fill-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s;margin-top:4px}
.fill-input:focus{border-color:var(--accent)}

/* WRITING */
.writing-section{padding:12px 16px}
.writing-prompt-card{background:linear-gradient(135deg,var(--accent) 0%,#1a8ab5 100%);border-radius:16px;padding:20px;margin-bottom:14px;color:white}
.writing-prompt-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:0.85;margin-bottom:8px}
.writing-prompt-text{font-size:14px;line-height:1.65}
.writing-task-num{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:0.85;margin-bottom:6px}
.writing-textarea{width:100%;min-height:200px;border:2px solid var(--border);border-radius:14px;padding:14px;font-size:14px;line-height:1.6;background:var(--bg);color:var(--text);resize:vertical;outline:none;transition:border-color 0.2s;font-family:inherit}
.writing-textarea:focus{border-color:var(--accent)}
.word-count{text-align:right;font-size:12px;color:var(--hint);margin-top:6px}
.word-count.ok{color:var(--success)}
.word-count.warn{color:var(--warn)}

/* SPEAKING */
.speaking-section{padding:12px 16px}
.speaking-intro{background:var(--bg2);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center}
.speaking-intro-icon{font-size:40px;margin-bottom:8px}
.speaking-intro-text{font-size:13px;color:var(--hint);line-height:1.5}
.speaking-q-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.speaking-q-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.speaking-q-text{font-size:14px;line-height:1.55;margin-bottom:10px}
.speaking-ans-label{font-size:12px;color:var(--hint);margin-bottom:4px}
.speaking-textarea{width:100%;min-height:100px;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;background:var(--bg2);color:var(--text);resize:none;outline:none;transition:border-color 0.2s;font-family:inherit}
.speaking-textarea:focus{border-color:var(--accent)}

/* SECTION INTRO */
.section-intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:24px;text-align:center;gap:12px}
.section-intro-emoji{font-size:64px;margin-bottom:8px}
.section-intro-title{font-size:22px;font-weight:800;color:var(--text)}
.section-intro-sub{font-size:14px;color:var(--hint);line-height:1.55;max-width:280px}
.section-intro-timer{font-size:14px;font-weight:600;color:var(--accent)}
.info-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text)}
.info-icon{font-size:16px}

/* FOOTER */
#footer{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border)}
#btn-action{width:100%;padding:15px;border:none;border-radius:14px;background:var(--accent);color:var(--accent-t);font-size:16px;font-weight:700;cursor:pointer;transition:opacity 0.2s;letter-spacing:0.2px}
#btn-action:active{opacity:0.85}
#btn-action:disabled{opacity:0.5;cursor:not-allowed}

/* RESULT */
#result-screen{display:none;padding:24px 16px;text-align:center;background:var(--bg);min-height:100vh}
.result-header{margin-bottom:28px}
.result-emoji{font-size:72px;margin-bottom:12px}
.result-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px}
.result-sub{font-size:14px;color:var(--hint)}
.result-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.result-card{background:var(--bg2);border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:space-between}
.result-card-label{font-size:14px;color:var(--hint);display:flex;align-items:center;gap:8px}
.result-card-score{font-size:20px;font-weight:800;color:var(--accent)}
.result-note{background:var(--bg2);border-radius:14px;padding:16px;font-size:13px;color:var(--hint);line-height:1.55}
.close-btn{margin-top:20px;width:100%;padding:14px;border:none;border-radius:14px;background:var(--accent);color:var(--accent-t);font-size:15px;font-weight:700;cursor:pointer}

/* GRAMMAR paginator */
.grammar-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.grammar-progress{font-size:13px;color:var(--hint)}
.grammar-dot-row{display:flex;gap:4px;flex-wrap:wrap;padding:0 16px 12px}
.gdot{width:10px;height:10px;border-radius:50%;background:var(--bg2);cursor:pointer;transition:background 0.2s;flex-shrink:0}
.gdot.answered{background:var(--accent)}
.gdot.current{border:2px solid var(--accent);background:var(--accent-t)}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Imtihon yuklanmoqda...</div>
</div>

<div id="app" style="display:none">
  <div id="header">
    <div id="section-steps"></div>
    <div id="header-main">
      <div id="section-label">
        <span id="section-emoji">📖</span>
        <div>
          <div id="section-name">Bo'lim</div>
          <div id="section-sub"></div>
        </div>
      </div>
      <div id="timer-box">
        <span id="timer-icon">⏱</span>
        <span id="timer-val">--:--</span>
      </div>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <div id="main"></div>

  <div id="footer">
    <button id="btn-action">Davom etish →</button>
  </div>
</div>

<div id="result-screen"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const OPTION_LETTERS = ['A','B','C','D','E','F'];

const state = {
  token: null,
  examData: null,
  si: 0,           // section index
  pi: 0,           // passage index (for passage_mcq)
  qi: 0,           // question index (for plain_mcq, shown in page of 5)
  grammarPage: 0,  // for grammar pagination
  answers: {},     // questionId -> answer string
  writingTexts: {},// sectionId -> text (or taskNum -> text for ielts writing)
  speakingTexts:{},// questionId -> text
  timers: {},      // sectionId -> remaining seconds
  activeTimer: null,
  showingIntro: true,
  headerH: 100,
};

const $ = id => document.getElementById(id);

// ── Load exam data ──────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  state.token = params.get('token');
  if (!state.token) { showError('Token topilmadi. Botga qayting.'); return; }

  try {
    const resp = await fetch('/api/exam/data?token=' + state.token);
    if (!resp.ok) { showError('Imtihon ma\'lumotlari yuklanmadi (' + resp.status + ')'); return; }
    state.examData = await resp.json();
    if (state.examData.error) { showError(state.examData.error); return; }
  } catch(e) { showError('Tarmoq xatosi. Qayta urinib ko\'ring.'); return; }

  // init timers
  for (const s of state.examData.sections) {
    state.timers[s.id] = (s.durationMinutes || 60) * 60;
  }
  // init answers containers
  for (const s of state.examData.sections) {
    if (!state.answers[s.id]) state.answers[s.id] = {};
  }

  $('loading-screen').style.display = 'none';
  $('app').style.display = 'block';
  setTimeout(() => { state.headerH = $('header').offsetHeight; renderSection(); }, 100);
}

function showError(msg) {
  $('loading-screen').innerHTML = `<div style="padding:32px;text-align:center;color:var(--danger)">
    <div style="font-size:48px;margin-bottom:12px">⚠️</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">Xatolik</div>
    <div style="font-size:14px;color:var(--hint)">${msg}</div>
  </div>`;
}

// ── Timer ────────────────────────────────────────────────────
function startTimer(sectionId) {
  if (state.activeTimer) clearInterval(state.activeTimer);
  state.activeTimer = setInterval(() => {
    if (state.timers[sectionId] <= 0) {
      clearInterval(state.activeTimer);
      autoAdvance();
      return;
    }
    state.timers[sectionId]--;
    renderTimerDisplay(sectionId);
  }, 1000);
  renderTimerDisplay(sectionId);
}

function renderTimerDisplay(sectionId) {
  const rem = state.timers[sectionId] ?? 0;
  const m = Math.floor(rem / 60);
  const s = rem % 60;
  const val = $('timer-val');
  const icon = $('timer-icon');
  val.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if (rem <= 60) { val.style.color = 'var(--danger)'; icon.textContent = '🔴'; }
  else if (rem <= 300) { val.style.color = 'var(--warn)'; icon.textContent = '🟡'; }
  else { val.style.color = 'var(--text)'; icon.textContent = '⏱'; }
}

function autoAdvance() {
  const sec = currentSection();
  if (!sec) return;
  if (state.showingIntro) { state.showingIntro = false; renderSection(); return; }
  advanceSection();
}

// ── Section helpers ──────────────────────────────────────────
function currentSection() { return state.examData?.sections[state.si]; }
function totalSections() { return state.examData?.sections.length ?? 0; }

function renderSteps() {
  const el = $('section-steps');
  el.innerHTML = '';
  for (let i = 0; i < totalSections(); i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === state.si ? ' active' : i < state.si ? ' done' : '');
    el.appendChild(d);
  }
}

function renderHeader(sec) {
  $('section-emoji').textContent = sec.emoji || '📋';
  $('section-name').textContent = sec.name || sec.nameUz || '';
  $('section-sub').textContent = sec.nameUz && sec.name !== sec.nameUz ? sec.nameUz : '';
  renderSteps();
  renderProgress();
}

function renderProgress() {
  const sec = currentSection();
  if (!sec) return;
  let pct = 0;
  if (sec.type === 'passage_mcq' && sec.passages) {
    const answered = Object.keys(state.answers[sec.id] || {}).length;
    const total = sec.passages.reduce((a,p) => a + (p.questions?.length || 0), 0);
    pct = total ? Math.round(answered / total * 100) : 0;
  } else if (sec.type === 'plain_mcq' && sec.questions) {
    const answered = Object.keys(state.answers[sec.id] || {}).length;
    pct = sec.questions.length ? Math.round(answered / sec.questions.length * 100) : 0;
  }
  $('progress-bar').style.width = pct + '%';
}

// ── Section render ────────────────────────────────────────────
function renderSection() {
  const sec = currentSection();
  if (!sec) { doSubmit(); return; }

  renderHeader(sec);
  $('main').style.paddingTop = ($('header').offsetHeight + 4) + 'px';

  if (state.showingIntro) {
    renderIntro(sec);
    $('btn-action').textContent = 'Boshlash ▶';
    $('btn-action').onclick = () => {
      state.showingIntro = false;
      startTimer(sec.id);
      renderSection();
    };
    return;
  }

  if (!state.activeTimer && !state.timers._started?.[sec.id]) {
    startTimer(sec.id);
  }

  if (sec.type === 'passage_mcq') renderPassageMCQ(sec);
  else if (sec.type === 'plain_mcq') renderPlainMCQ(sec);
  else if (sec.type === 'writing') renderWriting(sec);
  else if (sec.type === 'writing_tasks') renderWritingTasks(sec);
  else if (sec.type === 'speaking') renderSpeaking(sec);
  else renderSection();
}

function renderIntro(sec) {
  const min = sec.durationMinutes || 60;
  const qs = sec.passages
    ? sec.passages.reduce((a,p)=>a+(p.questions?.length||0),0)
    : sec.questions?.length ?? 0;
  $('main').innerHTML = `
    <div class="section-intro">
      <div class="section-intro-emoji">${sec.emoji || '📋'}</div>
      <div class="section-intro-title">${sec.name}</div>
      <div class="section-intro-sub">${sec.nameUz || ''}</div>
      <div class="section-intro-timer">⏱ ${min} daqiqa${qs ? ' · ' + qs + ' savol' : ''}</div>
      ${sec.type === 'passage_mcq' && sec.passages?.length ? `<div class="info-row"><span class="info-icon">📄</span>${sec.passages.length} ta matn + savollar</div>` : ''}
      ${sec.type === 'plain_mcq' ? `<div class="info-row"><span class="info-icon">✅</span>Har savolda bitta to'g'ri javob</div>` : ''}
      ${sec.type === 'writing' || sec.type === 'writing_tasks' ? `<div class="info-row"><span class="info-icon">✍️</span>Kamida 150 so'z yozing</div>` : ''}
      ${sec.type === 'speaking' ? `<div class="info-row"><span class="info-icon">💬</span>Savollarga matnda javob bering</div>` : ''}
    </div>`;
}

// ── Passage MCQ ───────────────────────────────────────────────
function renderPassageMCQ(sec) {
  const passages = sec.passages || [];
  if (passages.length === 0) { advanceSection(); return; }
  const p = passages[state.pi];
  if (!p) { advanceSection(); return; }

  const total = passages.length;
  const isLast = state.pi >= total - 1;
  const allAnswered = allPassageAnswered(sec);

  $('main').innerHTML = `
    <div class="passage-card">
      <div class="passage-title">${p.title || (state.pi + 1 + '. Matn')}</div>
      <div class="passage-text">${escHtml(p.text || '')}</div>
    </div>
    <div class="questions-block">
      ${(p.questions || []).map((q,i) => renderQuestionCard(q, i, sec.id)).join('')}
    </div>
    <div style="padding:0 16px 8px;display:flex;gap:8px;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--hint)">${state.pi+1} / ${total} matn</span>
      ${state.pi > 0 ? `<button onclick="prevPassage()" style="background:none;border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:13px;color:var(--text);cursor:pointer">← Ortga</button>` : '<span></span>'}
    </div>`;

  attachOptionListeners(sec.id);

  if (isLast && allAnswered) {
    $('btn-action').textContent = 'Bo\'limni tugatish ✓';
    $('btn-action').disabled = false;
    $('btn-action').onclick = () => advanceSection();
  } else if (isLast) {
    $('btn-action').textContent = 'Bo\'limni tugatish ✓';
    $('btn-action').disabled = false;
    $('btn-action').onclick = () => advanceSection();
  } else {
    $('btn-action').textContent = `Keyingi matn → (${state.pi+2}/${total})`;
    $('btn-action').disabled = false;
    $('btn-action').onclick = () => nextPassage(sec);
  }
  renderProgress();
}

function allPassageAnswered(sec) {
  const ans = state.answers[sec.id] || {};
  for (const p of (sec.passages || [])) {
    for (const q of (p.questions || [])) {
      if (!ans[q.id]) return false;
    }
  }
  return true;
}

function nextPassage(sec) {
  state.pi++;
  if (state.pi >= (sec.passages || []).length) { state.pi = 0; advanceSection(); }
  else renderSection();
}

function prevPassage() {
  if (state.pi > 0) { state.pi--; renderSection(); }
}

// ── Plain MCQ (Grammar) ───────────────────────────────────────
function renderPlainMCQ(sec) {
  const questions = sec.questions || [];
  if (questions.length === 0) { advanceSection(); return; }
  const PAGE = 5;
  const totalPages = Math.ceil(questions.length / PAGE);
  const start = state.grammarPage * PAGE;
  const pageQs = questions.slice(start, start + PAGE);
  const answered = Object.keys(state.answers[sec.id] || {}).length;

  $('main').innerHTML = `
    <div class="grammar-nav">
      <span class="grammar-progress">${answered} / ${questions.length} javob berildi</span>
      <span style="font-size:12px;color:var(--hint)">${state.grammarPage+1} / ${totalPages} sahifa</span>
    </div>
    <div class="grammar-dot-row">
      ${questions.map((q,i) => {
        const isAns = !!(state.answers[sec.id]?.[q.id]);
        const isPage = i >= start && i < start + PAGE;
        return `<div class="gdot${isAns?' answered':''}${isPage?' current':''}" title="${i+1}" onclick="goGrammarPage(${Math.floor(i/PAGE)})"></div>`;
      }).join('')}
    </div>
    <div class="questions-block">
      ${pageQs.map((q,i) => renderQuestionCard(q, start+i, sec.id)).join('')}
    </div>`;

  attachOptionListeners(sec.id);

  const isLast = state.grammarPage >= totalPages - 1;
  if (isLast) {
    $('btn-action').textContent = 'Bo\'limni tugatish ✓';
    $('btn-action').onclick = () => advanceSection();
  } else {
    $('btn-action').textContent = `Keyingisi → (${state.grammarPage+2}/${totalPages})`;
    $('btn-action').onclick = () => { state.grammarPage++; renderSection(); };
  }
  $('btn-action').disabled = false;
  renderProgress();
}

function goGrammarPage(page) {
  state.grammarPage = page;
  renderSection();
}

// ── Question card renderer ────────────────────────────────────
function renderQuestionCard(q, globalIdx, sectionId) {
  const qType = (q.type || q.question_type || 'multiple_choice').toLowerCase();
  const opts = parseOptions(q.options);
  const selected = state.answers[sectionId]?.[q.id] || null;

  if ((qType.includes('multiple') || qType.includes('true_false') || opts.length > 0)) {
    const optHtml = opts.map((opt, i) => {
      const letter = opt.letter || OPTION_LETTERS[i] || String(i+1);
      const txt = opt.text || opt;
      const isSel = selected === letter || selected === txt || selected === opt.raw;
      return `<div class="option${isSel?' selected':''}" data-qid="${q.id}" data-sid="${sectionId}" data-ans="${escAttr(letter)}" data-raw="${escAttr(opt.raw||letter)}">
        <div class="opt-badge">${letter}</div>
        <div class="opt-text">${escHtml(txt)}</div>
        <div class="opt-check">✓</div>
      </div>`;
    }).join('');
    return `<div class="q-card">
      <div class="q-head">
        <span class="q-num">Savol ${globalIdx+1}</span>
        <div class="q-text">${escHtml(q.text || q.question_text || '')}</div>
      </div>
      <div class="options-list">${optHtml}</div>
    </div>`;
  } else {
    // fill blank / short answer
    const curVal = state.answers[sectionId]?.[q.id] || '';
    return `<div class="q-card">
      <div class="q-head">
        <span class="q-num">Savol ${globalIdx+1}</span>
        <div class="q-text">${escHtml(q.text || q.question_text || '')}</div>
        <input class="fill-input" type="text" placeholder="Javobingizni yozing..." value="${escAttr(curVal)}"
          data-qid="${q.id}" data-sid="${sectionId}"
          oninput="state.answers[this.dataset.sid][this.dataset.qid]=this.value;renderProgress()">
      </div>
    </div>`;
  }
}

function parseOptions(raw) {
  if (!raw) return [];
  let arr = raw;
  if (typeof raw === 'string') { try { arr = JSON.parse(raw); } catch { arr = raw.split('\n').filter(Boolean); } }
  if (!Array.isArray(arr)) return [];
  return arr.map((o, i) => {
    const s = String(o).trim();
    const m = s.match(/^([A-Ea-e])[.\)]\s*(.+)/);
    if (m) return { letter: m[1].toUpperCase(), text: m[2].trim(), raw: s };
    return { letter: OPTION_LETTERS[i] || String(i+1), text: s, raw: s };
  });
}

function attachOptionListeners(sectionId) {
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qid = el.dataset.qid;
      const sid = el.dataset.sid;
      const ans = el.dataset.ans;
      if (!state.answers[sid]) state.answers[sid] = {};
      state.answers[sid][qid] = ans;
      // re-render only that question's options
      document.querySelectorAll(`.option[data-qid="${qid}"]`).forEach(o => {
        const isSel = o.dataset.ans === ans;
        o.classList.toggle('selected', isSel);
      });
      renderProgress();
    });
  });
}

// ── Writing ───────────────────────────────────────────────────
function renderWriting(sec) {
  const text = state.writingTexts[sec.id] || '';
  const wc = text.trim() ? text.trim().split(/\s+/).length : 0;
  $('main').innerHTML = `
    <div class="writing-section">
      <div class="writing-prompt-card">
        <div class="writing-prompt-label">📝 Yozma topshiriq</div>
        <div class="writing-prompt-text">${escHtml(sec.prompt || '')}</div>
      </div>
      <textarea class="writing-textarea" id="writing-ta" placeholder="Javobingizni shu yerga yozing..." rows="12">${escHtml(text)}</textarea>
      <div class="word-count ${wc >= 150 ? 'ok' : wc > 100 ? 'warn' : ''}" id="wc-label">${wc} so'z ${wc >= 150 ? '✓' : '(kamida 150)'}</div>
    </div>`;

  const ta = $('writing-ta');
  ta.addEventListener('input', () => {
    const v = ta.value;
    state.writingTexts[sec.id] = v;
    const w = v.trim() ? v.trim().split(/\s+/).length : 0;
    const lbl = $('wc-label');
    lbl.textContent = w + ' so\'z ' + (w >= 150 ? '✓' : '(kamida 150)');
    lbl.className = 'word-count ' + (w >= 150 ? 'ok' : w > 100 ? 'warn' : '');
  });

  $('btn-action').textContent = 'Bo\'limni tugatish ✓';
  $('btn-action').disabled = false;
  $('btn-action').onclick = () => advanceSection();
}

// ── Writing Tasks (IELTS: task1 + task2) ─────────────────────
function renderWritingTasks(sec) {
  const tasks = sec.tasks || [];
  if (!state.writingTexts[sec.id]) state.writingTexts[sec.id] = {};
  const html = tasks.map(t => {
    const key = 'task' + t.taskNumber;
    const text = state.writingTexts[sec.id][key] || '';
    const wc = text.trim() ? text.trim().split(/\s+/).length : 0;
    const minW = t.taskNumber === 1 ? 150 : 250;
    return `<div class="writing-prompt-card">
        <div class="writing-task-num">Task ${t.taskNumber}</div>
        <div class="writing-prompt-text">${escHtml(t.prompt || '')}</div>
      </div>
      <textarea class="writing-textarea" data-task="${t.taskNumber}" placeholder="Task ${t.taskNumber} javobingiz..." rows="10">${escHtml(text)}</textarea>
      <div class="word-count ${wc >= minW ? 'ok' : wc > 80 ? 'warn' : ''}" id="wc-${t.taskNumber}">${wc} so'z (kamida ${minW})</div>`;
  }).join('<div style="height:20px"></div>');

  $('main').innerHTML = `<div class="writing-section">${html}</div>`;

  document.querySelectorAll('.writing-textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      const key = 'task' + ta.dataset.task;
      state.writingTexts[sec.id][key] = ta.value;
      const w = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
      const minW = Number(ta.dataset.task) === 1 ? 150 : 250;
      const lbl = $('wc-' + ta.dataset.task);
      if (lbl) { lbl.textContent = w + ' so\'z (kamida ' + minW + ')'; lbl.className = 'word-count ' + (w >= minW ? 'ok' : w > 80 ? 'warn' : ''); }
    });
  });

  $('btn-action').textContent = 'Bo\'limni tugatish ✓';
  $('btn-action').disabled = false;
  $('btn-action').onclick = () => advanceSection();
}

// ── Speaking ──────────────────────────────────────────────────
function renderSpeaking(sec) {
  const questions = sec.questions || [];
  $('main').innerHTML = `
    <div class="speaking-section">
      <div class="speaking-intro">
        <div class="speaking-intro-icon">🗣</div>
        <div class="speaking-intro-text">Quyidagi savollarga <b>o'zbek yoki rus tilida</b> javob bering. Fikrlaringizni to'liq yozing.</div>
      </div>
      ${questions.map((q, i) => {
        const cur = state.speakingTexts[q.id] || '';
        return `<div class="speaking-q-card">
          <div class="speaking-q-label">Savol ${i+1}${q.partNumber ? ' · ' + q.partNumber + '-qism' : ''}</div>
          <div class="speaking-q-text">${escHtml(q.text || q.question_text || '')}</div>
          <div class="speaking-ans-label">Javobingiz:</div>
          <textarea class="speaking-textarea" data-qid="${q.id}" placeholder="Bu yerga yozing..." rows="4">${escHtml(cur)}</textarea>
        </div>`;
      }).join('')}
    </div>`;

  document.querySelectorAll('.speaking-textarea').forEach(ta => {
    ta.addEventListener('input', () => { state.speakingTexts[ta.dataset.qid] = ta.value; });
  });

  $('btn-action').textContent = 'Imtihonni yakunlash ✓';
  $('btn-action').disabled = false;
  $('btn-action').onclick = () => advanceSection();
}

// ── Section advance ───────────────────────────────────────────
function advanceSection() {
  if (state.activeTimer) { clearInterval(state.activeTimer); state.activeTimer = null; }
  state.si++;
  state.pi = 0;
  state.grammarPage = 0;
  state.showingIntro = true;
  if (state.si >= totalSections()) {
    doSubmit();
  } else {
    renderSection();
  }
}

// ── Submit ────────────────────────────────────────────────────
async function doSubmit() {
  if (state.activeTimer) clearInterval(state.activeTimer);
  $('app').style.display = 'none';
  $('result-screen').style.display = 'block';
  $('result-screen').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--hint)">Natijalar hisoblanmoqda...</div>
    <div style="font-size:12px;color:var(--hint)">AI baholash ~30 soniya davom etishi mumkin</div>
  </div>`;

  try {
    const payload = {
      token: state.token,
      mcqAnswers: {},
      writingTexts: state.writingTexts,
      speakingTexts: state.speakingTexts,
    };
    // merge all mcq answers from all sections
    for (const [sid, ans] of Object.entries(state.answers)) {
      for (const [qid, answer] of Object.entries(ans)) {
        payload.mcqAnswers[qid] = answer;
      }
    }

    const resp = await fetch('/api/exam/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();

    if (data.error) { showSubmitError(data.error); return; }
    showResult(data);
  } catch(e) {
    showSubmitError('Tarmoq xatosi. ' + e.message);
  }
}

function showSubmitError(msg) {
  $('result-screen').innerHTML = `<div style="padding:32px;text-align:center">
    <div style="font-size:48px;margin-bottom:12px">❌</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:var(--danger)">Yuborishda xatolik</div>
    <div style="font-size:13px;color:var(--hint);margin-bottom:20px">${msg}</div>
    <button onclick="doSubmit()" style="background:var(--accent);color:var(--accent-t);border:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">Qayta urinib ko'ring</button>
  </div>`;
}

function showResult(data) {
  const exam = state.examData;
  const isIelts = exam.examType === 'ielts';
  const overall = data.overall ?? data.overallScore ?? data.overall_score;
  const overallLabel = isIelts ? overall?.toFixed(1) : Math.round(overall) + '%';
  const emoji = isIelts ? bandEmoji(overall) : overall >= 66 ? '🎉' : overall >= 50 ? '🎓' : '📚';

  let scoresHtml = '';
  if (data.scores) {
    for (const [key, val] of Object.entries(data.scores)) {
      const lbl = { reading: '📖 Reading', listening: '🎧 Listening', grammar: '📝 Grammar', writing: '✍️ Writing', speaking: '🗣 Speaking', reading_score: '📖 Reading', listening_score: '🎧 Listening', grammar_score: '📝 Grammar', writing_score: '✍️ Writing', speaking_score: '🗣 Speaking' }[key] || key;
      const fmt = isIelts ? Number(val).toFixed(1) : Math.round(val) + '%';
      scoresHtml += `<div class="result-card"><div class="result-card-label">${lbl}</div><div class="result-card-score">${fmt}</div></div>`;
    }
  }

  const passed = data.passed;
  const passText = passed === true ? '✅ Siz imtihondan o\'tdingiz!' : passed === false ? '❌ Imtihon natijangiz o\'tish ballidan past.' : '';

  $('result-screen').innerHTML = `
    <div class="result-header" style="padding-top:32px">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${isIelts ? 'IELTS ' + overallLabel + ' Band' : overallLabel}</div>
      <div class="result-sub">${passText || 'Imtihon yakunlandi'}</div>
    </div>
    <div class="result-cards">${scoresHtml}</div>
    <div class="result-note">📱 To'liq natijalar va fikr-mulohazalar Telegram botida yuborildi. Botga qayting.</div>
    <button class="close-btn" onclick="closeMiniApp()">Botga qaytish →</button>`;
}

function closeMiniApp() { if (tg) tg.close(); }

function bandEmoji(b) {
  if (b >= 8) return '🏆';
  if (b >= 7) return '🥇';
  if (b >= 6) return '🥈';
  if (b >= 5) return '🥉';
  return '📚';
}

// ── Utilities ─────────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

init();
</script>
